<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0c0e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="IRON" />
    <meta name="description" content="IRON Workout Tracker" />
    <title>IRON</title>
    <style>
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        background: #0b0c0e;
        font-family: Georgia, serif;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        /* Push content below iPhone status bar */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      /* Prevent iOS zoom on input focus — keep font-size at 16px minimum */
      input, textarea, select {
        font-size: 16px !important;
      }
      /* Smooth scrolling for all scrollable elements */
      * {
        scroll-behavior: smooth;
      }
      /* Prevent double-tap zoom on buttons */
      button, a {
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run IRON.</noscript>
    <div id="root"></div>
  </body>
</html>
